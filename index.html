<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASSAULT OF SOUNDS</title>
    <style>
        body { margin: 0; background: black; color: #ff8c00; font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none; -webkit-user-select: none; }
        #ui-layer { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; z-index: 10; }
        .hidden { display: none !important; }
        #game-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box; border: 4px solid #ff8c00; pointer-events: none; z-index: 5; transition: border-color 0.2s, opacity 0.2s; }
        #game-frame.reloading { border-color: #552200; opacity: 0.5; }
        #logo { width: 80%; max-width: 600px; margin-bottom: 20px; opacity: 0; transition: opacity 2s; }
        .menu-item { font-size: 1.5rem; margin: 15px; cursor: pointer; border: 1px solid #ff8c00; padding: 10px 40px; width: 220px; transition: 0.3s; }
        .menu-item:hover { background: #ff8c00; color: black; }
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 1.5rem; pointer-events: none; font-weight: bold; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(255,140,0,0.4); pointer-events: none; opacity: 0; z-index: 6; }
        #result-screen { background: rgba(0,0,0,0.9); width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="game-frame"></div>
<div id="overlay"></div>

<div id="ui-layer">
    <div id="boot-screen">
        <img id="logo" src="img/brandlogo.png" alt="ASSAULT OF SOUNDS">
        <div id="tap-to-boot">INITIALIZING SYSTEM... [TAP TO START]</div>
    </div>

    <div id="main-menu" class="hidden">
        <h1 style="letter-spacing: 10px;">MAIN MENU</h1>
        <div class="menu-item" onclick="menuAction('GAME')">START</div>
        <div class="menu-item" onclick="menuAction('TRAINING')">TRAINING</div>
        <div class="menu-item" onclick="menuAction('SETTINGS')">SETTINGS</div>
    </div>

    <div id="settings-screen" class="hidden">
        <h2>AUDIO CALIBRATION</h2>
        <input type="range" id="pan-bias" min="-1" max="1" step="0.1" value="0" style="width:300px; accent-color:#ff8c00;">
        <div class="menu-item" onclick="saveSettings()">SAVE & BACK</div>
    </div>

    <div id="result-screen" class="hidden">
        <div id="result-msg" style="font-size: 2.5rem; margin-bottom: 30px;"></div>
        <div class="menu-item" onclick="changeState('MENU')">RETURN TO MENU</div>
    </div>

    <div id="hud" class="hidden">
        <div>HITS: <span id="score">0</span> / 10</div>
        <div>TIME: <span id="timer">30</span>s</div>
    </div>
</div>

<script>
    let audioCtx;
    const soundBuffers = {};
    let gameState = 'BOOT';
    let score = 0;
    let timeLeft = 30;
    let panBias = 0;
    let timerInterval;
    let canShoot = true;
    
    let enemyPos = { x: 0 }; 
    let enemyAngle = 0;
    let enemySpeed = 0.015;
    let enemySource, enemyPanner;

    // サウンドファイルのリスト
    const soundList = {
        menu_select: 'sounds/menu_select.mp3',
        missile: 'sounds/missile.mp3',
        enemy_engine: 'sounds/enemy_engine.mp3',
        hit_feedback: 'sounds/hit_feedback.mp3',
        break_feedback: 'sounds/break_feedback.mp3'
    };

    async function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('logo').style.opacity = 1;
        document.getElementById('tap-to-boot').innerText = "LOADING ASSETS...";

        // 全サウンドのプリロード
        for (const [name, url] of Object.entries(soundList)) {
            try {
                const response = await fetch(url);
                const arrayBuffer = await response.arrayBuffer();
                soundBuffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
            } catch (e) {
                console.warn(`Failed to load ${url}, will use synth.`);
            }
        }

        document.getElementById('tap-to-boot').innerText = "SYSTEM ONLINE";
        playSound('menu_select', 440, 0.2);
        setTimeout(() => changeState('MENU'), 1500);
    }

    function playSound(name, fallbackFreq = 440, duration = 0.2, pan = 0) {
        if (soundBuffers[name]) {
            const source = audioCtx.createBufferSource();
            source.buffer = soundBuffers[name];
            const panner = audioCtx.createStereoPanner();
            panner.pan.value = Math.max(-1, Math.min(1, pan + panBias));
            source.connect(panner).connect(audioCtx.destination);
            source.start();
            return source;
        } else {
            // ファイルがない場合の電子音代用
            playElectronic(fallbackFreq, duration, 'sine', pan);
        }
    }

    function playElectronic(freq, duration, type, pan) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const panner = audioCtx.createStereoPanner();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        panner.pan.value = Math.max(-1, Math.min(1, pan + panBias));
        osc.connect(gain).connect(panner).connect(audioCtx.destination);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function changeState(newState) {
        gameState = newState;
        clearInterval(timerInterval);
        if (enemySource) { enemySource.stop(); enemySource = null; }
        document.querySelectorAll('#ui-layer > div').forEach(div => div.classList.add('hidden'));
        
        if (newState === 'MENU') document.getElementById('main-menu').classList.remove('hidden');
        else if (newState === 'SETTINGS') { document.getElementById('settings-screen').classList.remove('hidden'); startCalibration(); }
        else if (newState === 'GAME' || newState === 'TRAINING') { document.getElementById('hud').classList.remove('hidden'); startGame(); }
        else if (newState === 'RESULT') document.getElementById('result-screen').classList.remove('hidden');
    }

    function menuAction(state) {
        playSound('menu_select');
        changeState(state);
    }

    function startGame() {
        score = 0; timeLeft = 30; canShoot = true;
        document.getElementById('score').innerText = score;
        document.getElementById('timer').innerText = timeLeft;
        
        // 敵のエンジン音ループ開始
        if (soundBuffers['enemy_engine']) {
            enemySource = audioCtx.createBufferSource();
            enemySource.buffer = soundBuffers['enemy_engine'];
            enemySource.loop = true;
            enemyPanner = audioCtx.createStereoPanner();
            enemySource.connect(enemyPanner).connect(audioCtx.destination);
            enemySource.start();
        }

        if (gameState === 'GAME') {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame("MISSION FAILED");
            }, 1000);
        }
        requestAnimationFrame(gameLoop);
    }

    function gameLoop() {
        if (gameState !== 'GAME' && gameState !== 'TRAINING') return;
        enemyAngle += enemySpeed;
        enemyPos.x = Math.sin(enemyAngle) * 1.8; 
        if (enemyPanner) enemyPanner.pan.value = Math.max(-1, Math.min(1, enemyPos.x + panBias));
        if (enemySpeed > 0.015) enemySpeed *= 0.98;
        requestAnimationFrame(gameLoop);
    }

    function shoot(e) {
        if (gameState === 'BOOT') { initAudio(); return; }
        if (!canShoot || (gameState !== 'GAME' && gameState !== 'TRAINING')) return;

        canShoot = false;
        document.getElementById('game-frame').classList.add('reloading');
        playElectronic(100, 0.1, 'sawtooth', 0); // 攻撃音（後ほどmp3化可能）

        const x = ((e.touches ? e.touches[0].clientX : e.clientX) / window.innerWidth) * 2 - 1;
        if (Math.abs(x - Math.max(-1, Math.min(1, enemyPos.x))) < 0.3) {
            score++;
            document.getElementById('score').innerText = score;
            playSound('hit_feedback', 1200, 0.2, enemyPos.x);
            flashOverlay();
            enemySpeed = 0.15;
            if (gameState === 'GAME' && score >= 10) {
                setTimeout(() => {
                    playSound('break_feedback');
                    endGame("MISSION ACCOMPLISHED");
                }, 300);
            }
        }
        setTimeout(() => { canShoot = true; document.getElementById('game-frame').classList.remove('reloading'); }, 1000);
    }

    function endGame(msg) {
        clearInterval(timerInterval);
        document.getElementById('result-msg').innerText = msg;
        changeState('RESULT');
    }

    function flashOverlay() {
        const ov = document.getElementById('overlay');
        ov.style.opacity = 1;
        setTimeout(() => ov.style.opacity = 0, 100);
    }

    function startCalibration() {
        const slider = document.getElementById('pan-bias');
        slider.oninput = (e) => { panBias = parseFloat(e.target.value); playElectronic(440, 0.05, 'sine', 0); };
    }
    function saveSettings() { playSound('menu_select'); changeState('MENU'); }

    window.addEventListener('mousedown', (e) => { if(e.button === 0) shoot(e); });
    window.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(e); }, {passive:false});
</script>
</body>
</html>
