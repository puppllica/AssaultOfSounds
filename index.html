<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ASSAULT OF SOUNDS</title>
    <style>
        body { margin: 0; background: black; color: #ff8c00; font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }
        #ui-layer { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; z-index: 10; box-sizing: border-box; padding: 20px; }
        .hidden { display: none !important; }
        #game-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box; border: 4px solid #ff8c00; pointer-events: none; z-index: 5; transition: border-color 0.1s; }
        #game-frame.reloading { border-color: #331100; }
        #hud { position: absolute; top: 40px; width: 100%; display: flex; justify-content: space-around; font-size: 1.2rem; pointer-events: none; font-weight: bold; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(255,140,0,0.4); pointer-events: none; opacity: 0; z-index: 6; }
        
        /* トップ画面のロゴとテキストの配置 */
        #boot-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #logo { width: 80%; max-width: 500px; margin-bottom: 40px; }
        
        /* [TAP TO START] の点滅アニメーション */
        .blink { animation: blink-animation 1.5s steps(2, start) infinite; -webkit-animation: blink-animation 1.5s steps(2, start) infinite; }
        @keyframes blink-animation { to { visibility: hidden; } }
        @-webkit-keyframes blink-animation { to { visibility: hidden; } }

        /* リザルト画面（iPhone対策済み） */
        #result-screen { background: rgba(0,0,0,0.95); width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 100px; box-sizing: border-box; }
        .stat-line { font-size: 1rem; margin: 8px; color: #aaa; }
        .btn-container { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .btn { font-size: 1.1rem; cursor: pointer; border: 2px solid #ff8c00; padding: 15px 50px; background: black; color: #ff8c00; text-decoration: none; display: block; min-width: 200px; font-weight: bold; }
        .btn-share { border-color: #1DA1F2; color: #1DA1F2; }
    </style>
</head>
<body>

<div id="game-frame"></div>
<div id="overlay"></div>

<div id="ui-layer">
    <div id="boot-screen">
        <img id="logo" src="img/brandlogo.png" alt="ASSAULT OF SOUNDS">
        <div id="status-text" class="blink" style="font-size: 1.5rem; letter-spacing: 2px;">[TAP TO START]</div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 style="letter-spacing: 5px; color: #ff8c00;">MISSION COMPLETE</h1>
        <div id="score-details"></div>
        <div class="btn-container">
            <a href="#" id="share-btn" class="btn btn-share" target="_blank">SHARE ON X</a>
            <div id="redeploy-btn" class="btn">RE-DEPLOY</div>
        </div>
    </div>

    <div id="hud" class="hidden">
        <div>HITS: <span id="hits">0</span> / 10</div>
        <div>TIME: <span id="timer">60</span>s</div>
    </div>
</div>

<script>
    let audioCtx;
    const soundBuffers = {};
    let gameState = 'BOOT';
    let hits = 0, shotsFired = 0, timeLeft = 60, timerInterval, canShoot = true, isLocked = false;
    let enemyAngle = 0, targetAngle = 0, enemySpeed = 0.015, enemySource, enemyPanner;

    const soundList = {
        menu_select: 'sounds/menu_select.mp3',
        missile: 'sounds/missile.mp3',
        enemy_engine: 'sounds/enemy_engine.mp3',
        hit_feedback: 'sounds/hit_feedback.mp3',
        break_feedback: 'sounds/break_feedback.mp3'
    };

    async function initGame() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 読み込み中は点滅を止め、テキストを変える
        const status = document.getElementById('status-text');
        status.classList.remove('blink');
        status.innerText = "LOADING ASSETS...";
        
        for (const [name, url] of Object.entries(soundList)) {
            try {
                const response = await fetch(url);
                const arrayBuffer = await response.arrayBuffer();
                soundBuffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
            } catch (e) { console.warn(name + " load failed"); }
        }
        startGame();
    }

    function startGame() {
        gameState = 'GAME';
        hits = 0; shotsFired = 0; timeLeft = 60;
        document.getElementById('boot-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('hits').innerText = hits;
        document.getElementById('timer').innerText = timeLeft;
        
        if (soundBuffers['enemy_engine']) {
            enemySource = audioCtx.createBufferSource();
            enemySource.buffer = soundBuffers['enemy_engine'];
            enemySource.loop = true;
            enemyPanner = audioCtx.createStereoPanner();
            enemySource.connect(enemyPanner).connect(audioCtx.destination);
            enemySource.start();
        }

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
        requestAnimationFrame(update);
    }

    function update() {
        if (gameState !== 'GAME') return;
        if (!isLocked) {
            let diff = targetAngle - enemyAngle;
            enemyAngle += diff * enemySpeed;
            targetAngle += Math.sin(Date.now() * 0.001) * 0.02;
            if (enemySpeed > 0.015) enemySpeed *= 0.96;
        }
        if (enemyPanner) enemyPanner.pan.value = Math.max(-1, Math.min(1, Math.sin(enemyAngle) * 1.5));
        requestAnimationFrame(update);
    }

    function shoot(e) {
        if (gameState === 'BOOT') { initGame(); return; }
        if (gameState !== 'GAME' || !canShoot) return;
        canShoot = false; isLocked = true; shotsFired++;
        document.getElementById('game-frame').classList.add('reloading');
        playOneShot('missile', 0, 0.6);
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const x = (clientX / window.innerWidth) * 2 - 1;
        const enemyXAtShoot = Math.max(-1, Math.min(1, Math.sin(enemyAngle) * 1.5));
        
        setTimeout(() => {
            if (gameState !== 'GAME') return;
            if (Math.abs(x - enemyXAtShoot) < 0.25) {
                hits++;
                document.getElementById('hits').innerText = hits;
                playOneShot('hit_feedback', enemyXAtShoot);
                flash();
                targetAngle = enemyAngle + (Math.random() > 0.5 ? 1 : -1) * (Math.PI * 0.8);
                enemySpeed = 0.2; 
                if (hits >= 10) setTimeout(() => { playOneShot('break_feedback'); endGame(); }, 500);
            }
            isLocked = false; 
        }, 1000);
        setTimeout(() => { canShoot = true; document.getElementById('game-frame').classList.remove('reloading'); }, 1000);
    }

    function playOneShot(name, pan = 0, volume = 0.5) {
        if (!soundBuffers[name]) return;
        const s = audioCtx.createBufferSource();
        const p = audioCtx.createStereoPanner();
        const g = audioCtx.createGain();
        s.buffer = soundBuffers[name];
        p.pan.value = Math.max(-1, Math.min(1, pan));
        g.gain.value = volume;
        s.connect(p).connect(g).connect(audioCtx.destination);
        s.start();
    }

    function endGame() {
        gameState = 'RESULT';
        clearInterval(timerInterval);
        if (enemySource) { enemySource.stop(); enemySource = null; }

        const accuracy = shotsFired > 0 ? (hits / shotsFired) : 0;
        const timeBonus = timeLeft * 100;
        const accBonus = Math.floor(accuracy * 5000);
        const total = (hits * 1000) + timeBonus + accBonus;

        document.getElementById('hud').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('score-details').innerHTML = `
            <div class="stat-line">BASE HITS (${hits}): ${hits * 1000}</div>
            <div class="stat-line">TIME BONUS (${timeLeft}s): +${timeBonus}</div>
            <div class="stat-line">ACCURACY (${(accuracy*100).toFixed(1)}%): +${accBonus}</div>
            <h2 style="color:#ff8c00; font-size:1.8rem; margin-top:20px;">TOTAL SCORE: ${total}</h2>
        `;

        const shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent('TOTAL SCORE: ' + total + ' #ASSAULTOFSOUNDS')}&url=${encodeURIComponent(window.location.href)}`;
        document.getElementById('share-btn').onclick = (e) => { window.open(shareUrl, '_blank'); };
    }

    function flash() {
        const o = document.getElementById('overlay');
        o.style.opacity = 1; setTimeout(() => o.style.opacity = 0, 100);
    }

    // イベント設定（iPhone対策済み）
    window.addEventListener('touchstart', (e) => { 
        if (gameState === 'RESULT') return;
        if (gameState === 'GAME') { e.preventDefault(); shoot(e); } 
        else if (gameState === 'BOOT') { initGame(); } // BOOT画面でのタップ
    }, {passive:false});
    
    window.addEventListener('mousedown', (e) => { 
        if (gameState === 'GAME') shoot(e); 
        else if (gameState === 'BOOT' && e.button === 0) { initGame(); }
    });

    document.getElementById('redeploy-btn').addEventListener('touchstart', (e) => {
        e.stopPropagation();
        gameState = 'BOOT';
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('boot-screen').classList.remove('hidden');
        const status = document.getElementById('status-text');
        status.innerText = "[TAP TO START]"; // テキストを戻す
        status.classList.add('blink'); // 点滅を再開
    });
</script>
</body>
</html>
