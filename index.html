<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ASSAULT OF SOUNDS</title>
    <style>
        body { margin: 0; background: black; color: #ff8c00; font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }
        #ui-layer { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; z-index: 10; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }
        #game-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box; border: 4px solid #ff8c00; pointer-events: none; z-index: 5; transition: border-color 0.1s; }
        #game-frame.reloading { border-color: #331100; }
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 1.5rem; pointer-events: none; font-weight: bold; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(255,140,0,0.4); pointer-events: none; opacity: 0; z-index: 6; }
        #result-screen { background: rgba(0,0,0,0.9); width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .stat-line { font-size: 1.2rem; margin: 10px; color: #aaa; }
        
        /* ボタンのデザイン */
        .btn-container { display: flex; gap: 20px; margin-top: 40px; }
        .btn { font-size: 1.2rem; cursor: pointer; border: 1px solid #ff8c00; padding: 10px 30px; background: black; color: #ff8c00; transition: 0.2s; text-decoration: none; }
        .btn:active { background: #ff8c00; color: black; }
        .btn-share { border-color: #1DA1F2; color: #1DA1F2; } /* X/Twitterカラー */
        .btn-share:active { background: #1DA1F2; color: black; }
    </style>
</head>
<body>

<div id="game-frame"></div>
<div id="overlay"></div>

<div id="ui-layer">
    <div id="boot-screen">
        <div id="status-text" style="font-size: 1.5rem;">SYSTEM INITIALIZING... [TAP TO LAUNCH]</div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 style="letter-spacing: 5px; color: #ff8c00;">MISSION COMPLETE</h1>
        <div id="score-details"></div>
        <div class="btn-container">
            <a href="#" id="share-btn" class="btn btn-share" target="_blank">SHARE ON X</a>
            <div class="btn" onclick="resetGame()">RE-DEPLOY</div>
        </div>
    </div>

    <div id="hud" class="hidden">
        <div>HITS: <span id="hits">0</span> / 10</div>
        <div>TIME: <span id="timer">60</span>s</div>
    </div>
</div>

<script>
    let audioCtx;
    const soundBuffers = {};
    let gameState = 'BOOT';
    let hits = 0;
    let shotsFired = 0;
    let timeLeft = 60;
    let timerInterval;
    let canShoot = true;
    let isLocked = false;
    
    let enemyAngle = 0;
    let targetAngle = 0;
    let enemySpeed = 0.015;
    let enemySource, enemyPanner;

    const soundList = {
        menu_select: 'sounds/menu_select.mp3',
        missile: 'sounds/missile.mp3',
        enemy_engine: 'sounds/enemy_engine.mp3',
        hit_feedback: 'sounds/hit_feedback.mp3',
        break_feedback: 'sounds/break_feedback.mp3'
    };

    async function initGame() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('status-text').innerText = "LOADING ASSETS...";

        for (const [name, url] of Object.entries(soundList)) {
            try {
                const response = await fetch(url);
                const arrayBuffer = await response.arrayBuffer();
                soundBuffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
            } catch (e) { console.warn(name + " load failed"); }
        }
        startGame();
    }

    function startGame() {
        gameState = 'GAME';
        hits = 0; shotsFired = 0; timeLeft = 60;
        document.getElementById('boot-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('hits').innerText = hits;
        document.getElementById('timer').innerText = timeLeft;
        
        if (soundBuffers['enemy_engine']) {
            enemySource = audioCtx.createBufferSource();
            enemySource.buffer = soundBuffers['enemy_engine'];
            enemySource.loop = true;
            enemyPanner = audioCtx.createStereoPanner();
            enemySource.connect(enemyPanner).connect(audioCtx.destination);
            enemySource.start();
        }

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);

        requestAnimationFrame(update);
    }

    function update() {
        if (gameState !== 'GAME') return;

        if (!isLocked) {
            let diff = targetAngle - enemyAngle;
            enemyAngle += diff * enemySpeed;
            targetAngle += Math.sin(Date.now() * 0.001) * 0.02;
            if (enemySpeed > 0.015) enemySpeed *= 0.96;
        }

        if (enemyPanner) {
            enemyPanner.pan.value = Math.max(-1, Math.min(1, Math.sin(enemyAngle) * 1.5));
        }
        
        requestAnimationFrame(update);
    }

    function shoot(e) {
        if (gameState === 'BOOT') { initGame(); return; }
        if (gameState !== 'GAME' || !canShoot) return;

        canShoot = false;
        isLocked = true;
        shotsFired++;
        document.getElementById('game-frame').classList.add('reloading');
        
        playOneShot('missile', 0, 0.6);

        const x = ((e.touches ? e.touches[0].clientX : e.clientX) / window.innerWidth) * 2 - 1;
        const enemyXAtShoot = Math.max(-1, Math.min(1, Math.sin(enemyAngle) * 1.5));

        setTimeout(() => {
            if (gameState !== 'GAME') return;

            if (Math.abs(x - enemyXAtShoot) < 0.25) {
                hits++;
                document.getElementById('hits').innerText = hits;
                playOneShot('hit_feedback', enemyXAtShoot);
                flash();
                
                targetAngle = enemyAngle + (Math.random() > 0.5 ? 1 : -1) * (Math.PI * 0.8);
                enemySpeed = 0.2; 
                
                if (hits >= 10) {
                    setTimeout(() => { playOneShot('break_feedback'); endGame(); }, 500);
                }
            }
            isLocked = false; 

        }, 1000);
        
        setTimeout(() => { 
            canShoot = true; 
            document.getElementById('game-frame').classList.remove('reloading'); 
        }, 1000);
    }

    function playOneShot(name, pan = 0, volume = 0.5) {
        if (!soundBuffers[name]) return;
        const s = audioCtx.createBufferSource();
        const g = audioCtx.createGain();
        const p = audioCtx.createStereoPanner();
        s.buffer = soundBuffers[name];
        p.pan.value = Math.max(-1, Math.min(1, pan));
        g.gain.value = volume;
        s.connect(p).connect(g).connect(audioCtx.destination);
        s.start();
    }

    // 【修正】iPhone対応のための内部リセット関数
    function resetGame() {
        if (enemySource) { enemySource.stop(); enemySource = null; }
        clearInterval(timerInterval);
        gameState = 'BOOT';
        
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('boot-screen').classList.remove('hidden');
        document.getElementById('status-text').innerText = "SYSTEM RE-READY [TAP TO LAUNCH]";
        // 最初の画面に戻り、タップを待つ状態にする（iOSの音再生権限を再取得）
    }

    function endGame() {
        gameState = 'RESULT';
        clearInterval(timerInterval);
        if (enemySource) enemySource.stop();

        const accuracy = shotsFired > 0 ? (hits / shotsFired) : 0;
        const timeBonus = timeLeft * 100;
        const accBonus = Math.floor(accuracy * 5000);
        const total = (hits * 1000) + timeBonus + accBonus;

        document.getElementById('hud').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('score-details').innerHTML = `
            <div class="stat-line">BASE HITS (${hits}): ${hits * 1000}</div>
            <div class="stat-line">TIME BONUS (${timeLeft}s): +${timeBonus}</div>
            <div class="stat-line">ACCURACY (${(accuracy*100).toFixed(1)}%): +${accBonus}</div>
            <h2 style="color:#ff8c00; font-size:2.5rem;">TOTAL SCORE: ${total}</h2>
        `;

        // SNS共有用URLの設定
        const shareText = encodeURIComponent(`TOTAL SCORE: ${total} #ASSAULTOFSOUNDS`);
        const shareUrl = `https://twitter.com/intent/tweet?text=${shareText}`;
        document.getElementById('share-btn').href = shareUrl;
    }

    function flash() {
        const o = document.getElementById('overlay');
        o.style.opacity = 1; setTimeout(() => o.style.opacity = 0, 100);
    }

    // イベントリスナー
    window.addEventListener('mousedown', (e) => { if(e.button===0) shoot(e); });
    window.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(e); }, {passive:false});
</script>
</body>
</html>
